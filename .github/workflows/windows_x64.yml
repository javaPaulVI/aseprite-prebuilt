name: Aseprite Windows x64 Build

on:
  workflow_call:

jobs:
  build:
    runs-on: windows-2022

    env:
      DEPS_DIR: ${{ github.workspace }}\deps
      ASEPRITE_DIR: ${{ github.workspace }}\aseprite
      BUILD_DIR: ${{ github.workspace }}\aseprite\build

    steps:
      # -----------------------------
      # 1. GET LATEST STABLE RELEASE
      # -----------------------------
      - name: Resolve latest stable Aseprite release
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/aseprite/aseprite/releases"

          $stable = $releases |
            Where-Object { $_.draft -eq $false -and $_.prerelease -eq $false } |
            Sort-Object published_at -Descending |
            Select-Object -First 1

          if (-not $stable) { throw "No stable release found" }

          echo "ASEPRITE_TAG=$($stable.tag_name)" >> $env:GITHUB_ENV
          echo "Using: $($stable.tag_name)"

      # -----------------------------
      # 2. CLONE ASEPRITE
      # -----------------------------
      - name: Clone Aseprite
        shell: pwsh
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git $env:ASEPRITE_DIR
          cd $env:ASEPRITE_DIR
          git checkout $env:ASEPRITE_TAG

          if (!(Test-Path "CMakeLists.txt")) {
            throw "Missing CMakeLists.txt"
          }

      # -----------------------------
      # 3. RESOLVE SKIA URL
      # -----------------------------
      - name: Resolve Skia URL
        shell: pwsh
        run: |
          cd "$env:ASEPRITE_DIR\laf\misc"
          $url = bash ./skia-url.sh release windows x64
          echo "SKIA_URL=$url" >> $env:GITHUB_ENV

      # -----------------------------
      # 4. DOWNLOAD + VALIDATE SKIA
      # -----------------------------
      - name: Download Skia
        shell: pwsh
        run: |
          Invoke-WebRequest $env:SKIA_URL -OutFile skia.zip

          if (!(Test-Path skia.zip)) { throw "Skia download failed" }
          if ((Get-Item skia.zip).Length -lt 1MB) { throw "Skia zip corrupted" }

      # -----------------------------
      # 5. EXTRACT SKIA
      # -----------------------------
      - name: Extract Skia
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force $env:DEPS_DIR\skia -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $env:DEPS_DIR\skia

          Expand-Archive skia.zip -DestinationPath $env:DEPS_DIR\skia -Force

          if (!(Test-Path "$env:DEPS_DIR\skia\include")) {
            throw "Invalid Skia structure"
          }

      # -----------------------------
      # 6. INSTALL TOOLS
      # -----------------------------
      - name: Install build tools
        run: choco install cmake ninja git -y

      # -----------------------------
      # 7. CONFIGURE
      # -----------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          cd $env:BUILD_DIR
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=deps\skia -DSKIA_LIBRARY_DIR=deps\skia\out\Release-x64 -DSKIA_LIBRARY=deps\skia\out\Release-x64\skia.lib -G Ninja ..

      # -----------------------------
      # 8. BUILD
      # -----------------------------
      - name: Build
        run: ninja aseprite

      # -----------------------------
      # 9. PACKAGE
      # -----------------------------
      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          copy "$env:BUILD_DIR\bin\aseprite.exe" dist\
          Compress-Archive dist\* aseprite-windows-x64.zip -Force

      # -----------------------------
      # 10. RELEASE
      # -----------------------------
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ASEPRITE_TAG }}
          name: Aseprite ${{ env.ASEPRITE_TAG }} (only win-x64)
          files: aseprite-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
