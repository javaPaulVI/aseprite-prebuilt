name: Linux x64 Aseprite

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup workspace
        run: |
          export ASEPRITE_DIR=$GITHUB_WORKSPACE/aseprite
          export DEPS_DIR=$GITHUB_WORKSPACE/deps
          export BUILD_DIR=$GITHUB_WORKSPACE/build

          mkdir -p $ASEPRITE_DIR $DEPS_DIR $BUILD_DIR

      - name: Install base tools (minimal)
        run: sudo apt-get update && sudo apt-get install -y git curl unzip

      - name: Clone Aseprite
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git aseprite

          test -f aseprite/CMakeLists.txt || (echo "FAIL" && exit 1)

      - name: Download Skia
        run: |
          curl -L "https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Linux-Release-x64.zip" -o skia.zip

      - name: Extract Skia
        run: |
          mkdir -p deps/skia
          unzip -o skia.zip -d deps/skia

          test -d deps/skia/include || (echo "SKIA FAIL" && exit 1)

      - name: Install build tools
        run: sudo apt-get install -y cmake ninja-build clang

      - name: Debug
        run: |
          ls -R aseprite | head -n 50
          ls -R deps/skia | head -n 50

      - name: Configure
        run: |
          cmake -G Ninja \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$GITHUB_WORKSPACE/deps/skia \
            -S $GITHUB_WORKSPACE/aseprite \
            -B $GITHUB_WORKSPACE/build

      - name: Build
        run: cmake --build build --target aseprite -v
