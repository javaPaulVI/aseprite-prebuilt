name: macOS arm64 Aseprite

on:
  workflow_call:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Setup
        run: |
          mkdir -p aseprite deps build

      - name: Install tools
        run: brew install cmake ninja git curl unzip

      - name: Clone
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git aseprite
          test -f aseprite/CMakeLists.txt || exit 1

      - name: Skia
        run: |
          curl -L "https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-macOS-Release-arm64.zip" -o skia.zip
          mkdir -p deps/skia
          unzip -o skia.zip -d deps/skia

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$GITHUB_WORKSPACE/deps/skia \
            -S $GITHUB_WORKSPACE/aseprite \
            -B $GITHUB_WORKSPACE/build

      - name: Build
        run: cmake --build build --target aseprite -v
