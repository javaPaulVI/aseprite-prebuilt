name: Build Aseprite (Stable + Verified Skia)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          choco install cmake ninja -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ----------------------------
      # ASEPRITE SOURCE
      # ----------------------------
      - name: Clone Aseprite
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git


      # ----------------------------
      # SKIA (STRICT VALIDATION)
      # ----------------------------
      - name: Download Skia (Aseprite-compatible)
        run: |
          mkdir C:\deps
          cd C:\deps
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
          powershell Expand-Archive skia.zip -DestinationPath C:\deps\skia
          dir C:\deps\skia

      - name: Validate Skia structure (FAIL FAST)
        run: |
          if (!(Test-Path "C:\deps\skia\out\Release-x64\skia.lib")) {
            echo "❌ Invalid Skia package: missing skia.lib"
            exit 1
          }

          if (!(Test-Path "C:\deps\skia\third_party")) {
            echo "❌ Invalid Skia package: missing third_party folder"
            exit 1
          }


      # ----------------------------
      # CONFIGURE
      # ----------------------------
      - name: Configure CMake
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=C:\deps\skia `
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 `
            -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib `
            -S aseprite `
            -B aseprite\build

      # ----------------------------
      # BUILD
      # ----------------------------
      - name: Build Aseprite
        run: |
          cmake --build aseprite\build --target aseprite --config RelWithDebInfo

      # ----------------------------
      # PACKAGE
      # ----------------------------
      - name: Package
        run: |
          mkdir dist
          copy aseprite\build\bin\aseprite.exe dist\
          powershell Compress-Archive dist\* aseprite-win.zip

      # ----------------------------
      # ARTIFACT
      # ----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-build
          path: aseprite-win.zip

      # ----------------------------
      # RELEASE
      # ----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: aseprite-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
