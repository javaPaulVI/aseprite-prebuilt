name: Build Aseprite (Stable)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-2022

    steps:
      # -----------------------
      # Checkout (workflow repo)
      # -----------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------
      # Install build tools
      # -----------------------
      - name: Install dependencies
        run: |
          choco install cmake ninja -y

      # -----------------------
      # Enable MSVC toolchain
      # -----------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -----------------------
      # Pinned Skia (IMPORTANT)
      # -----------------------
      - name: Download Skia
        run: |
          mkdir C:\deps
          cd C:\deps
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439/Skia-Windows-Release-x64.zip
          powershell Expand-Archive skia.zip -DestinationPath C:\deps\skia

      # -----------------------
      # Clone Aseprite
      # -----------------------
      - name: Clone Aseprite
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git

      # -----------------------
      # Configure (FIXED CMake STYLE)
      # -----------------------
      - name: Configure CMake
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=C:\deps\skia `
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 `
            -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib `
            -S aseprite `
            -B aseprite\build

      # -----------------------
      # Build
      # -----------------------
      - name: Build
        run: |
          cmake --build aseprite\build --target aseprite --config RelWithDebInfo

      # -----------------------
      # Package
      # -----------------------
      - name: Package
        run: |
          mkdir dist
          copy aseprite\build\bin\aseprite.exe dist\
          powershell Compress-Archive dist\* aseprite-win.zip

      # -----------------------
      # Upload artifact
      # -----------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-build
          path: aseprite-win.zip

      # -----------------------
      # Create release (optional)
      # -----------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: aseprite-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
