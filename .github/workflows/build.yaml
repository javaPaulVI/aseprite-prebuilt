name: Aseprite CI (Cached Skia + Debug Enabled)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  ASEPRITE_DIR: ${{ github.workspace }}/aseprite
  BUILD_DIR: ${{ github.workspace }}/build
  DEPS_DIR: ${{ github.workspace }}/deps

  # DEBUG MODE (ON by default)
  DEBUG: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            arch: x64

          - os: ubuntu-22.04
            platform: linux
            arch: x64

          - os: macos-14
            platform: macos
            arch: x64
            cmake_arch: x86_64

          - os: macos-14
            platform: macos
            arch: arm64
            cmake_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      # ----------------------------
      # DEBUG INFO (ALWAYS)
      # ----------------------------
      - name: Debug environment
        shell: bash
        run: |
          echo "=== DEBUG MODE ENABLED ==="
          echo "OS: ${{ matrix.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -R .

      # ----------------------------
      # TOOLS
      # ----------------------------
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang git unzip curl

      - name: Install tools (Windows)
        if: matrix.platform == 'windows'
        run: choco install cmake ninja git -y

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ----------------------------
      # CLONE ASEPRITE
      # ----------------------------
      - name: Clone Aseprite
        shell: bash
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git $ASEPRITE_DIR
          cd $ASEPRITE_DIR

          echo "=== Git tags ==="
          git tag --list | tail -n 20

          # latest stable tag (simple + safe heuristic)
          tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)

          echo "Selected tag: $tag"
          git checkout $tag
          git submodule update --init --recursive

          echo "ASEPRITE_TAG=$tag" >> $GITHUB_ENV

      # ----------------------------
      # SKIA TAG (SOURCE OF TRUTH)
      # ----------------------------
      - name: Read Skia tag
        id: skia_tag
        shell: bash
        run: |
          tag=$(cat $ASEPRITE_DIR/laf/misc/skia-tag.txt | xargs)
          echo "SKIA_TAG=$tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT

      # ----------------------------
      # SKIA URL (OFFICIAL SCRIPT)
      # ----------------------------
      - name: Resolve Skia URL
        id: skia
        shell: bash
        run: |
          cd $ASEPRITE_DIR/laf/misc
          chmod +x skia-url.sh

          url=$(./skia-url.sh release ${{ matrix.platform }} ${{ matrix.arch }})

          echo "SKIA_URL=$url"
          echo "url=$url" >> $GITHUB_OUTPUT

      # ----------------------------
      # CACHE SKIA (CRITICAL)
      # ----------------------------
      - name: Cache Skia
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_DIR }}/skia
          key: skia-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.skia_tag.outputs.tag }}

      # ----------------------------
      # DOWNLOAD SKIA (ONLY IF MISS)
      # ----------------------------
      - name: Download Skia
        if: steps.cache-skia.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "=== DOWNLOADING SKIA ==="
          mkdir -p $DEPS_DIR

          curl -L "${{ steps.skia.outputs.url }}" -o skia.zip
          ls -lh skia.zip

          unzip skia.zip -d $DEPS_DIR/skia

          echo "=== SKIA CONTENTS ==="
          ls -R $DEPS_DIR/skia | head -n 200

      # ----------------------------
      # SETUP MSVC ENV (MAC/LINUX SAFE NO-OP)
      # ----------------------------
      - name: Setup CMake config
        shell: bash
        run: |
          echo "=== CONFIGURE STEP ==="

          if [ "${{ matrix.platform }}" = "windows" ]; then
            cmake -G Ninja ^
              -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
              -DLAF_BACKEND=skia ^
              -DSKIA_DIR="$DEPS_DIR/skia" ^
              -DSKIA_LIBRARY_DIR="$DEPS_DIR/skia/out/Release-x64" ^
              -DSKIA_LIBRARY="$DEPS_DIR/skia/out/Release-x64/skia.lib" ^
              -S $ASEPRITE_DIR ^
              -B $BUILD_DIR
          else
            cmake -G Ninja \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DLAF_BACKEND=skia \
              -DSKIA_DIR=$DEPS_DIR/skia \
              -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
              -S $ASEPRITE_DIR \
              -B $BUILD_DIR
          fi

      # ----------------------------
      # BUILD (LOUD DEBUG)
      # ----------------------------
      - name: Build Aseprite
        shell: bash
        run: |
          echo "=== BUILD START ==="
          cmake --build $BUILD_DIR --target aseprite --config RelWithDebInfo -v

      # ----------------------------
      # PACKAGE
      # ----------------------------
      - name: Package
        shell: bash
        run: |
          echo "=== PACKAGING ==="
          mkdir -p dist

          ls $BUILD_DIR/bin || true
          cp -r $BUILD_DIR/bin/* dist/ || true

          zip -r aseprite-${{ matrix.platform }}-${{ matrix.arch }}.zip dist

      # ----------------------------
      # UPLOAD ARTIFACT
      # ----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-${{ matrix.platform }}-${{ matrix.arch }}
          path: aseprite-*.zip
