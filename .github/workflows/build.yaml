name: Aseprite Build (Stable + Skia-matched)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  # =========================
  # DEBUG TOGGLE (CHANGE THIS)
  # =========================
  DEBUG_MODE: "true"

  ASEPRITE_DIR: C:\workspace\aseprite
  BUILD_DIR: C:\workspace\build
  DEPS_DIR: C:\deps

jobs:
  build:
    runs-on: windows-2022

    steps:
      # -------------------------
      # SYSTEM
      # -------------------------
      - name: Setup tools
        run: choco install cmake ninja git -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -------------------------
      # CLONE ASEPRITE
      # -------------------------
      - name: Clone Aseprite
        shell: pwsh
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git $env:ASEPRITE_DIR

      # -------------------------
      # RESOLVE ASEPRITE TAG (SOURCE OF TRUTH)
      # -------------------------
      - name: Resolve Aseprite Tag
        id: aseprite
        shell: pwsh
        run: |
          cd $env:ASEPRITE_DIR

          $tag = git tag --list "v*" --sort=-v:refname | Select-Object -First 1
          if (-not $tag) { throw "No Aseprite tag found" }

          git checkout $tag
          git submodule update --init --recursive

          Write-Host "Aseprite tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      # -------------------------
      # DEBUG: ASEPRITE STRUCTURE
      # -------------------------
      - name: Debug Aseprite (optional)
        if: env.DEBUG_MODE == 'true'
        shell: pwsh
        run: |
          Write-Host "=== ASEPRITE TREE ==="
          Get-ChildItem $env:ASEPRITE_DIR -Recurse -Depth 2

      # -------------------------
      # READ SKIA TAG (ABSOLUTE SOURCE OF TRUTH)
      # -------------------------
      - name: Read Skia Tag
        shell: pwsh
        run: |
          $skiaTag = Get-Content "$env:ASEPRITE_DIR\laf\misc\skia-tag.txt" -Raw
          $skiaTag = $skiaTag.Trim()

          if (-not $skiaTag) { throw "Missing skia-tag.txt" }

          echo "skia=$skiaTag" >> $env:GITHUB_OUTPUT

      # -------------------------
      # BUILD SKIA URL
      # -------------------------
      - name: Resolve Skia URL
        id: skia
        shell: pwsh
        run: |
          $tag = "${{ steps.read-skia.outputs.skia }}"
          $url = "https://github.com/aseprite/skia/releases/download/$tag/Skia-Windows-Release-x64.zip"

          Write-Host "Skia tag: $tag"
          Write-Host "Skia URL: $url"

          echo "url=$url" >> $env:GITHUB_OUTPUT

      # -------------------------
      # DOWNLOAD SKIA
      # -------------------------
      - name: Download Skia
        shell: pwsh
        run: |
          mkdir $env:DEPS_DIR -Force

          Invoke-WebRequest "${{ steps.skia.outputs.url }}" -OutFile skia.zip

          if ((Get-Item skia.zip).Length -lt 10MB) {
            throw "Skia download invalid"
          }

          Expand-Archive skia.zip -DestinationPath "$env:DEPS_DIR\skia" -Force

      # -------------------------
      # DEBUG SKIA (OPTIONAL)
      # -------------------------
      - name: Debug Skia
        if: env.DEBUG_MODE == 'true'
        shell: pwsh
        run: |
          Write-Host "=== SKIA CONTENT ==="
          Get-ChildItem "$env:DEPS_DIR\skia" -Recurse -Depth 2

      # -------------------------
      # CONFIGURE BUILD
      # -------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$env:DEPS_DIR\skia" `
            -DSKIA_LIBRARY_DIR="$env:DEPS_DIR\skia\out\Release-x64" `
            -DSKIA_LIBRARY="$env:DEPS_DIR\skia\out\Release-x64\skia.lib" `
            -S $env:ASEPRITE_DIR `
            -B $env:BUILD_DIR

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config RelWithDebInfo --target aseprite

      # -------------------------
      # DEBUG OUTPUT
      # -------------------------
      - name: Debug Build Output
        if: env.DEBUG_MODE == 'true'
        shell: pwsh
        run: |
          Write-Host "=== BIN OUTPUT ==="
          Get-ChildItem "$env:BUILD_DIR\bin" -Recurse

      # -------------------------
      # PACKAGE
      # -------------------------
      - name: Package
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item "$env:BUILD_DIR\bin\aseprite.exe" dist\
          Compress-Archive dist\* aseprite-win.zip -Force

      # -------------------------
      # RELEASE (MIRROR TAG)
      # -------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.aseprite.outputs.tag }}
          name: Aseprite ${{ steps.aseprite.outputs.tag }}
          files: aseprite-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
