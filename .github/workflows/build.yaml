name: Auto Build Aseprite (Stable Skia)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: windows-2022

    env:
      WORKSPACE: C:\workspace
      ASEPRITE_DIR: C:\workspace\aseprite
      BUILD_DIR: C:\workspace\aseprite\build
      SKIA_DIR: C:\deps\skia

    steps:
      # ----------------------------
      # SETUP
      # ----------------------------
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Install tools
        run: choco install cmake ninja git -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare workspace
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:WORKSPACE
          New-Item -ItemType Directory -Force -Path C:\deps

      # ----------------------------
      # GET LATEST ASEPRITE TAG
      # ----------------------------
      - name: Get latest Aseprite tag
        id: aseprite
        shell: pwsh
        run: |
          $tag = git ls-remote --tags --sort="v:refname" https://github.com/aseprite/aseprite.git |
            Select-String "refs/tags/v" |
            ForEach-Object { ($_ -split "refs/tags/")[1] } |
            Select-Object -Last 1

          echo "ASEPRITE_VERSION=$tag" >> $env:GITHUB_ENV
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Latest Aseprite: $tag"

      # ----------------------------
      # CHECK IF RELEASE EXISTS
      # ----------------------------
      - name: Check existing release
        id: check
        shell: pwsh
        run: |
          $tag = "${{ steps.aseprite.outputs.tag }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "Release already exists → skipping build"
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            echo "New version → building"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------
      # STOP IF ALREADY BUILT
      # ----------------------------
      - name: Stop if already built
        if: steps.check.outputs.exists == 'true'
        run: exit 0

      # ----------------------------
      # CLONE ASEPRITE
      # ----------------------------
      - name: Clone Aseprite
        shell: pwsh
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git $env:ASEPRITE_DIR
          cd $env:ASEPRITE_DIR
          git checkout $env:ASEPRITE_VERSION
          git submodule update --init --recursive

      # ----------------------------
      # SKIA (PINNED + VALIDATED)
      # ----------------------------
      - name: Download Skia (pinned m124-08a5439a6b)
        shell: pwsh
        run: |
          $url = "https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile skia.zip

          if (!(Test-Path skia.zip)) {
            throw "Skia download failed"
          }

          if ((Get-Item skia.zip).Length -lt 1000000) {
            throw "Downloaded file is invalid (too small)"
          }

          Expand-Archive skia.zip -Force -DestinationPath $env:SKIA_DIR

          if (!(Test-Path "$env:SKIA_DIR\out\Release-x64\skia.lib")) {
            throw "Missing skia.lib → invalid Skia package"
          }

          if (!(Test-Path "$env:SKIA_DIR\third_party")) {
            throw "Missing third_party → incomplete Skia package"
          }

      # ----------------------------
      # CONFIGURE
      # ----------------------------
      - name: Configure CMake
        shell: pwsh
        run: |
          $skia = $env:SKIA_DIR

          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$skia" `
            -DSKIA_LIBRARY_DIR="$skia\out\Release-x64" `
            -DSKIA_LIBRARY="$skia\out\Release-x64\skia.lib" `
            -S $env:ASEPRITE_DIR `
            -B $env:BUILD_DIR

      # ----------------------------
      # BUILD
      # ----------------------------
      - name: Build Aseprite
        run: |
          cmake --build $env:BUILD_DIR --target aseprite --config RelWithDebInfo

      # ----------------------------
      # PACKAGE
      # ----------------------------
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "$env:BUILD_DIR\bin\aseprite.exe" dist\
          Compress-Archive dist\* aseprite-win.zip -Force

      # ----------------------------
      # CREATE RELEASE
      # ----------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ASEPRITE_VERSION }}
          name: Aseprite ${{ env.ASEPRITE_VERSION }}
          files: aseprite-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
