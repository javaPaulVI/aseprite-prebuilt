name: Auto Build Aseprite (Stable Skia)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # daily check for new Aseprite release

jobs:
  build:
    runs-on: windows-2022

    steps:
      # ----------------------------
      # BASIC SETUP
      # ----------------------------
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Install tools
        run: choco install cmake ninja git -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ----------------------------
      # GET LATEST ASEPRITE TAG
      # ----------------------------
      - name: Get latest Aseprite version
        shell: pwsh
        run: |
          $tag = git ls-remote --tags --sort="v:refname" https://github.com/aseprite/aseprite.git |
            Select-String "refs/tags/v" |
            ForEach-Object { ($_ -split "refs/tags/")[1] } |
            Select-Object -Last 1

          echo "ASEPRITE_VERSION=$tag" >> $env:GITHUB_ENV
          echo "Building $tag"

      # ----------------------------
      # PINNED SKIA (DO NOT CHANGE)
      # ----------------------------
      - name: Download Skia (LOCKED)
        shell: pwsh
        run: |
          mkdir C:\deps

          $url = "https://github.com/aseprite/skia/releases/download/m124-08a5439/Skia-Windows-Release-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile skia.zip

          if ((Get-Item skia.zip).Length -lt 1000000) {
            throw "Skia download failed (invalid file)"
          }

          Expand-Archive skia.zip -DestinationPath C:\deps\skia -Force

      # ----------------------------
      # CLONE ASEPRITE
      # ----------------------------
      - name: Clone Aseprite
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git
          cd aseprite
          git checkout $env:ASEPRITE_VERSION
          git submodule update --init --recursive

      # ----------------------------
      # CONFIGURE
      # ----------------------------
      - name: Configure CMake
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=C:\deps\skia `
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 `
            -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib `
            -S aseprite `
            -B aseprite\build

      # ----------------------------
      # BUILD
      # ----------------------------
      - name: Build Aseprite
        run: |
          cmake --build aseprite\build --target aseprite --config RelWithDebInfo

      # ----------------------------
      # PACKAGE
      # ----------------------------
      - name: Package
        run: |
          mkdir dist
          copy aseprite\build\bin\aseprite.exe dist\
          powershell Compress-Archive dist\* aseprite-win.zip

      # ----------------------------
      # CHECK IF RELEASE EXISTS
      # ----------------------------
      - name: Check existing release
        id: check
        shell: pwsh
        run: |
          $tag = $env:ASEPRITE_VERSION
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------
      # CREATE RELEASE (ONLY IF NEW)
      # ----------------------------
      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ASEPRITE_VERSION }}
          name: Aseprite ${{ env.ASEPRITE_VERSION }}
          files: aseprite-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
