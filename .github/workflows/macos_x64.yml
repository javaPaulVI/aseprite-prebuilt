name: Aseprite macOS x64

on:
  workflow_call:
  workflow_dispatch:

env:
  ASEPRITE_DIR: ${{ github.workspace }}/aseprite
  BUILD_DIR: ${{ github.workspace }}/build
  DEPS_DIR: ${{ github.workspace }}/deps

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Debug start
        run: |
          echo "=== MACOS X64 BUILD ==="
          pwd
          ls -la

      # ----------------------------
      # CLONE ASEPRITE
      # ----------------------------
      - name: Clone Aseprite
        run: |
          git clone --recursive https://github.com/aseprite/aseprite.git $ASEPRITE_DIR
          cd $ASEPRITE_DIR

          tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)
          echo "Selected tag: $tag"

          git checkout "$tag"
          git submodule update --init --recursive

      # ----------------------------
      # SKIA URL
      # ----------------------------
      - name: Resolve Skia URL
        id: skia
        run: |
          cd $ASEPRITE_DIR/laf/misc
          chmod +x skia-url.sh

          url=$(./skia-url.sh release macos x64)
          echo "url=$url" >> $GITHUB_OUTPUT

      # ----------------------------
      # SKIA DOWNLOAD + FIXED EXTRACT
      # ----------------------------
      - name: Download + Extract Skia
        run: |
          set -e

          curl -L "${{ steps.skia.outputs.url }}" -o skia.zip

          rm -rf $DEPS_DIR/skia
          mkdir -p $DEPS_DIR/skia

          unzip -o skia.zip -d $DEPS_DIR/skia

          echo "=== SKIA CONTENTS ==="
          ls -R $DEPS_DIR/skia | head -n 100

      # ----------------------------
      # CONFIGURE
      # ----------------------------
      - name: Configure CMake
        run: |
          cmake -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$DEPS_DIR/skia \
            -S $ASEPRITE_DIR \
            -B $BUILD_DIR

      # ----------------------------
      # BUILD
      # ----------------------------
      - name: Build
        run: cmake --build $BUILD_DIR --target aseprite -v
